<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة المضارع البسيط</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #0b1a2e, #1a2f44);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            border-radius: 50px;
            padding: 25px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        .header {
            background: #112b3f;
            padding: 15px 20px;
            border-radius: 60px;
            border: 1px solid #f7d44a;
            text-align: center;
            margin-bottom: 15px;
        }
        .header h1 {
            color: #ffecb0;
            font-size: 1.4rem;
        }
        .header h1 span {
            background: #f5c542;
            color: #0b1a2e;
            padding: 0 12px;
            border-radius: 30px;
        }
        .sponsor {
            color: #fadf9e;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .sponsor strong {
            color: #ffd966;
        }

        /* أسماء اللاعبين */
        .players-box {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            background: #1a3146;
            padding: 12px 18px;
            border-radius: 60px;
            border: 1px solid #a4853a;
            margin-bottom: 15px;
            justify-content: center;
            align-items: center;
        }
        .players-box label {
            color: #e6dcc0;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .players-box input {
            background: #112b3f;
            color: #f5e7c8;
            border: 1px solid #dbb44b;
            border-radius: 40px;
            padding: 5px 14px;
            font-weight: 600;
            width: 120px;
            text-align: center;
        }
        .players-box input:focus {
            outline: 2px solid #f5c542;
        }
        .btn-small {
            background: #465f74;
            border: 1px solid #9cb7d0;
            border-radius: 40px;
            padding: 6px 18px;
            color: #f0f4fa;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-small:active {
            transform: scale(0.95);
        }

        /* شريط التحكم */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            background: #1a3146;
            padding: 10px 18px;
            border-radius: 60px;
            border: 1px solid #a4853a;
            margin-bottom: 15px;
            align-items: center;
            justify-content: center;
        }
        .controls label {
            color: #e6dcc0;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .controls select,
        .controls button {
            background: #112b3f;
            color: #f5e7c8;
            border: 1px solid #dbb44b;
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .controls select:hover,
        .controls button:hover {
            background: #1f405b;
            border-color: #f5c542;
        }
        .train-btn {
            background: #2e5a47;
            border-color: #84c9a0;
        }
        .train-btn.active {
            background: #b8862d;
            border-color: #f5d98a;
            box-shadow: 0 0 12px #f5c542;
        }
        .train-sub {
            display: none;
            gap: 8px;
        }
        .train-sub.show {
            display: flex;
        }
        .train-sub button {
            background: #2a4a5a;
            border-color: #6a9ab0;
            padding: 4px 14px;
            font-size: 0.85rem;
        }
        .train-sub button.active-option {
            background: #b8862d;
            border-color: #f5d98a;
        }

        /* منطقة اللعب */
        .quiz-area {
            background: #1d3347;
            border-radius: 40px;
            padding: 20px;
            border: 1px solid #bb9b4a;
        }
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .turn-badge {
            background: #112b3f;
            padding: 6px 22px;
            border-radius: 60px;
            color: #f5d98a;
            border: 1px solid #e8bf5a;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .turn-badge i {
            background: #f3b33d;
            color: #0b1a2e;
            padding: 0 14px;
            border-radius: 30px;
            font-style: normal;
        }
        .score-hidden {
            color: #b8cfdd;
            background: #0d2133;
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px dashed #6a8fa0;
            font-weight: 500;
        }
        .q-counter {
            color: #b8cfdd;
            font-weight: 500;
        }

        .question-box {
            background: #0b1d2e;
            padding: 25px 20px;
            border-radius: 50px;
            border: 2px solid #f3c557;
            margin-bottom: 18px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .question-text {
            color: #fcf3dc;
            font-size: 1.6rem;
            font-weight: 600;
            text-align: center;
            line-height: 1.6;
            direction: ltr;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        .option-btn {
            background: #203a4f;
            border: 2px solid #4d6b84;
            border-radius: 60px;
            padding: 14px 10px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #e9f0f5;
            cursor: pointer;
            box-shadow: 0 5px 0 #102231;
            transition: 0.08s;
            text-align: center;
        }
        .option-btn:hover:not(:disabled) {
            background: #2d4d69;
            border-color: #eac05a;
            transform: scale(0.97);
        }
        .option-btn:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #102231;
        }
        .option-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translateY(3px);
            box-shadow: 0 2px 0 #102231;
        }
        .option-btn.correct-show {
            background: #2b9e42;
            border-color: #b0ff9e;
            box-shadow: 0 0 24px #77dd77;
            color: #fff;
        }
        .option-btn.wrong-show {
            background: #b13e3e;
            border-color: #ff9e9e;
            box-shadow: 0 0 24px #ff7777;
            color: #fff;
        }
        .option-btn.half-show {
            background: #b8862d;
            border-color: #f5d98a;
            box-shadow: 0 0 20px #f5b342;
            color: #fff;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            margin-top: 10px;
        }
        .actions button {
            border: none;
            border-radius: 60px;
            padding: 12px 30px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.06s;
            box-shadow: 0 5px 0 #1d3140;
        }
        .actions button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1d3140;
        }
        .btn-reset {
            background: #465f74;
            color: #f0f4fa;
            border: 1px solid #9cb7d0;
        }
        .btn-next {
            background: #f5c542;
            color: #0b1a2e;
            flex: 1;
            box-shadow: 0 6px 0 #936f1f;
        }
        .btn-next:disabled {
            opacity: 0.4;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #6b4f16;
            pointer-events: none;
        }

        .celebrate-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px 16px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 18px;
            border-radius: 80px;
            backdrop-filter: blur(4px);
            margin-top: 12px;
            min-height: 60px;
        }
        .celebrate-item {
            font-size: 2.2rem;
            animation: pop 0.25s ease;
            filter: drop-shadow(0 0 12px #ffd966);
        }
        @keyframes pop {
            0% {
                transform: scale(0.1);
                opacity: 0;
            }
            80% {
                transform: scale(1.3);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 18px;
            padding-top: 15px;
            border-top: 1px solid #3a5b74;
            color: #b6c9db;
            font-size: 0.85rem;
        }
        .btn-whatsapp {
            background: #25D366;
            border: none;
            border-radius: 40px;
            padding: 8px 24px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 0 #1a8c4a;
            transition: 0.06s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-whatsapp:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1a8c4a;
        }

        /* شهادة */
        .cert-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .cert-overlay.show {
            display: flex;
        }
        .cert {
            background: linear-gradient(145deg, #f5e7c8, #ffd966);
            border-radius: 40px;
            padding: 40px 50px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.6);
            border: 4px solid #b8860b;
        }
        .cert h1 {
            color: #1a2f44;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .cert .winner {
            font-size: 2.8rem;
            font-weight: 900;
            color: #b8860b;
            margin: 12px 0;
        }
        .cert .score-text {
            font-size: 1.4rem;
            color: #1a2f44;
            margin: 8px 0;
        }
        .cert .stars-big {
            font-size: 3rem;
            margin: 10px 0;
        }
        .cert .btn-close-cert {
            background: #1a2f44;
            border: none;
            border-radius: 40px;
            padding: 12px 40px;
            color: #ffd966;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 12px;
        }
        .cert .btn-close-cert:hover {
            background: #2a4f64;
        }

        @media (max-width: 650px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            .players-box {
                flex-direction: column;
                align-items: stretch;
            }
            .players-box label {
                justify-content: center;
            }
            .question-text {
                font-size: 1.2rem;
            }
            .cert {
                padding: 25px 20px;
            }
            .cert .winner {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- رأس الصفحة -->
        <div class="header">
            <h1>⚽ <span id="name1display">اللاعب 1</span> 🆚 <span id="name2display">اللاعب 2</span> ⚽</h1>
            <div class="sponsor">🏆 برعاية <strong>مستر سامح عبد الحفيظ</strong></div>
        </div>

        <!-- أسماء اللاعبين -->
        <div class="players-box">
            <label>👤 الأول: <input type="text" id="p1name" value="أحمد" maxlength="15"></label>
            <label>👤 الثاني: <input type="text" id="p2name" value="محمد" maxlength="15"></label>
            <button class="btn-small" id="updateNamesBtn">تحديث</button>
        </div>

        <!-- شريط التحكم -->
        <div class="controls">
            <label>📊 عدد الأسئلة:
                <select id="qCount">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="40">40</option>
                    <option value="50">50</option>
                </select>
            </label>
            <button class="train-btn" id="trainBtn">🧘 تدريب حر</button>
            <div class="train-sub" id="trainSub">
                <button id="subPractice" class="active-option">📝 تدريبات</button>
                <button id="subExam">📊 اختبار</button>
            </div>
            <span style="color:#c0d0dd;" id="totalDisplay">الإجمالي: 20</span>
        </div>

        <!-- منطقة المسابقة -->
        <div class="quiz-area">

            <div class="top-row">
                <div class="turn-badge">🎯 دور: <i id="turnDisplay">اللاعب 1</i></div>
                <div class="score-hidden" id="scoreHidden">🔒 النتيجة مخفية</div>
                <div class="q-counter">السؤال <span id="qNum">1</span>/<span id="qTotal">20</span></div>
            </div>

            <div class="question-box">
                <div class="question-text" id="questionText">اضغط "إعادة" للبدء</div>
            </div>

            <div class="options-grid" id="optionsGrid">
                <button class="option-btn" data-idx="0">—</button>
                <button class="option-btn" data-idx="1">—</button>
                <button class="option-btn" data-idx="2">—</button>
                <button class="option-btn" data-idx="3">—</button>
            </div>

            <div class="actions">
                <button class="btn-reset" id="resetBtn">⟳ إعادة</button>
                <button class="btn-next" id="nextBtn" disabled>▶ التالي</button>
            </div>

            <div class="celebrate-box" id="celebrateBox">
                <span style="color:#e6d5b8;">🎁 انتظر الإجابة 🎉</span>
            </div>

        </div>

        <!-- فوتر -->
        <div class="footer">
            <span>📘 المضارع البسيط · إثبات · نفي · سؤال</span>
            <span style="color:#e6c27a;">| خطأ ← نصف نقطة للآخر</span>
            <button class="btn-whatsapp" id="sendResultBtn">📤 إرسال النتيجة للمستر</button>
        </div>

    </div>

    <!-- شهادة -->
    <div class="cert-overlay" id="certOverlay">
        <div class="cert">
            <h1>🏆 شهادة تحفيز 🏆</h1>
            <div class="stars-big">⭐ 🌟 ⭐ 🌟 ⭐</div>
            <div style="font-size:1.1rem; color:#1a2f44;">الفائز</div>
            <div class="winner" id="certWinner">أحمد</div>
            <div class="score-text" id="certScore">النتيجة: 10 - 8</div>
            <div style="color:#1a2f44; margin:6px 0;">🎉 مبروك! أداء رائع 🎉</div>
            <button class="btn-close-cert" id="closeCert">إغلاق</button>
        </div>
    </div>

    <script>
        // ============================================================
        // بنك الأسئلة - 70 سؤال متنوع
        // ============================================================
        const BANK = [
            // Positive - Singular
            { q: 'She ______ (play) tennis every Friday.', opts: ['play', 'plays', 'playing', 'to play'], correct: 1 },
            { q: 'My father ______ (work) in a bank.', opts: ['work', 'works', 'working', 'to work'], correct: 1 },
            { q: 'The sun ______ (rise) in the east.', opts: ['rise', 'rises', 'rising', 'to rise'], correct: 1 },

            { q: 'My parents ______ (live) in a flat.', opts: ['live', 'lives', 'living', 'to live'], correct: 0 },
            { q: 'The birds ______ (fly) south.', opts: ['fly', 'flies', 'flying', 'to fly'], correct: 0 },
            { q: 'The children ______ (play) in the park.', opts: ['play', 'plays', 'playing', 'to play'], correct: 0 },
            { q: 'My friends ______ (like) pizza.', opts: ['like', 'likes', 'liking', 'to like'], correct: 0 },

            { q: 'She ______ (not / like) coffee.', opts: ['doesn\'t like', 'don\'t like', 'not like', 'isn\'t like'],

            { q: 'I ______ (not / eat) meat.', opts: ['doesn\'t eat', 'don\'t eat', 'not eat', 'am not eat'], correct: 1 },

            { q: '______ your brother speak Spanish?', opts: ['Do', 'Does', 'Is', 'Are'], correct: 1 },
            { q: '______ your parents live in Cairo?', opts: ['Do', 'Does', 'Are', 'Is'], correct: 0 },
            { q: '______ she like ice-cream?', opts: ['Do', 'Does', 'Is', 'Are'], correct: 1 },

            { q: '______ do you usually wake up?', opts: ['What', 'When', 'Where', 'Who'], correct: 1 },

            { q: '______ book is this?', opts: ['What', 'Which', 'Who', 'Whose'], correct: 3 },
            { q: '______ do you live?', opts: ['What', 'Where', 'When', 'Why'], correct: 1 },
            { q: '______ much does it cost?', opts: ['How', 'What', 'Which', 'Who'], correct: 0 },
            { q: '______ old are you?', opts: ['How', 'What', 'When', 'Where'], correct: 0 }
        ];

        // ============================================================
        // حالة اللعبة
        // ============================================================
        let state = {
            questions: [],
            currentIndex: 0,
            total: 20,
            p1Score: 0,
            p2Score: 0,
            p1Name: 'أحمد',
            p2Name: 'محمد',
            turn: 1, // 1 or 2
            isAnswered: false,
            isGameOver: false,
            isTrain: false,
            trainSub: 'practice', // 'practice' or 'exam'
            halfUsed: false,
            wrongTeam: null,
            locked: false,
            correctIdx: 0,
        };

        // ============================================================
        // عناصر DOM
        // ============================================================
        const $ = id => document.getElementById(id);
        const p1name = $('p1name');
        const p2name = $('p2name');
        const name1display = $('name1display');
        const name2display = $('name2display');
        const turnDisplay = $('turnDisplay');
        const scoreHidden = $('scoreHidden');
        const qNum = $('qNum');
        const qTotal = $('qTotal');
        const totalDisplay = $('totalDisplay');
        const questionText = $('questionText');
        const optionsBtns = document.querySelectorAll('.option-btn');
        const nextBtn = $('nextBtn');
        const resetBtn = $('resetBtn');
        const trainBtn = $('trainBtn');
        const trainSub = $('trainSub');
        const subPractice = $('subPractice');
        const subExam = $('subExam');
        const qCount = $('qCount');
        const celebrateBox = $('celebrateBox');
        const sendResultBtn = $('sendResultBtn');
        const certOverlay = $('certOverlay');
        const certWinner = $('certWinner');
        const certScore = $('certScore');
        const closeCert = $('closeCert');
        const updateNamesBtn = $('updateNamesBtn');

        // ============================================================
        // دوال مساعدة
        // ============================================================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function shuffleOptions(q) {
            const opts = [...q.opts];
            const correctAns = opts[q.correct];
            shuffleArray(opts);
            const newCorrect = opts.indexOf(correctAns);
            return { shuffled: opts, correct: newCorrect };
        }

        function getPlayerName(n) {
            return n === 1 ? state.p1Name : state.p2Name;
        }

        function updateNamesUI() {
            name1display.textContent = state.p1Name;
            name2display.textContent = state.p2Name;
            if (!state.isTrain) {
                turnDisplay.textContent = getPlayerName(state.turn);
            }
        }

        function updateScoreUI() {
            if (state.isTrain && state.trainSub === 'practice') {
                scoreHidden.textContent = `📊 ${state.p1Name}: ${state.p1Score} | ${state.p2Name}: ${state.p2Score}`;
            } else if (state.isGameOver) {
                scoreHidden.textContent = `🏁 ${state.p1Name}: ${state.p1Score} - ${state.p2Name}: ${state.p2Score}`;
            } else {
                scoreHidden.textContent = '🔒 النتيجة مخفية';
            }
        }

        function updateCounterUI() {
            qNum.textContent = state.currentIndex + 1;
            qTotal.textContent = state.total;
            totalDisplay.textContent = `الإجمالي: ${state.total}`;
        }

        function clearCelebration() {
            celebrateBox.innerHTML = `<span style="color:#e6d5b8;">🎁 انتظر الإجابة 🎉</span>`;
        }

        function showCelebration(team, isHalf = false) {
            const emojis = ['⭐', '🌟', '🎁', '🎉', '✨', '🎊', '💫', '🏅', '🎈', '🌸'];
            let html = '';
            for (let i = 0; i < 6; i++) {
                const e = emojis[Math.floor(Math.random() * emojis.length)];
                html += `<span class="celebrate-item" style="font-size:${2 + Math.random() * 0.8}rem;">${e}</span>`;
            }
            const name = getPlayerName(team);
            const pts = isHalf ? '0.5' : '1';
            html += `<span style="color:#ffdd99; font-size:1.6rem; font-weight:700;">➕ ${pts} نقطة لـ ${name}</span>`;
            celebrateBox.innerHTML = html;
        }

        // ============================================================
        // بناء الأسئلة
        // ============================================================
        function buildQuestions(count, train = false) {
            let pool = [...BANK];
            if (train) {
                let result = [];
                while (result.length < 100) {
                    for (let q of pool) {
                        if (result.length >= 100) break;
                        result.push({ ...q });
                    }
                }
                return result;
            } else {
                shuffleArray(pool);
                return pool.slice(0, Math.min(count, pool.length));
            }
        }

        // ============================================================
        // تحميل السؤال
        // ============================================================
        function loadQuestion(index) {
            const q = state.questions[index];
            if (!q) {
                // نهاية اللعبة
                state.isGameOver = true;
                questionText.textContent = '🎯 انتهت المسابقة!';
                optionsBtns.forEach(b => { b.disabled = true;
                    b.textContent = '—'; });
                nextBtn.disabled = true;
                updateScoreUI();
                showCertificate();
                return;
            }

            const shuffled = shuffleOptions(q);
            state.correctIdx = shuffled.correct;
            const opts = shuffled.shuffled;

            questionText.textContent = q.q;
            optionsBtns.forEach((btn, i) => {
                btn.textContent = opts[i] || '—';
                btn.disabled = false;
                btn.className = 'option-btn';
                btn.dataset.correct = (i === state.correctIdx) ? 'true' : 'false';
            });

            state.isAnswered = false;
            state.halfUsed = false;
            state.wrongTeam = null;
            state.locked = false;
            state.isGameOver = false;
            nextBtn.disabled = true;
            clearCelebration();
            updateCounterUI();
            updateScoreUI();

            if (state.isTrain) {
                turnDisplay.textContent = '🧘 تدريب حر';
                if (state.trainSub === 'practice') {
                    // في التدريبات نعرض النتيجة لحظياً
                }
            } else {
                turnDisplay.textContent = getPlayerName(state.turn);
            }
        }

        // ============================================================
        // الانتقال للسؤال التالي (تلقائي أو يدوي)
        // ============================================================
        function goToNext() {
            if (state.isGameOver) return;
            if (!state.isAnswered && !state.isTrain) {
                if (!state.halfUsed) return;
            }
            if (state.currentIndex >= state.total - 1) {
                loadQuestion(state.currentIndex + 1);
                return;
            }
            state.currentIndex++;
            loadQuestion(state.currentIndex);
        }

        // ============================================================
        // شهادة التحفيز
        // ============================================================
        function showCertificate() {
            let winner = '';
            let scoreText = '';
            if (state.p1Score > state.p2Score) {
                winner = state.p1Name;
                scoreText = `${state.p1Name}: ${state.p1Score} - ${state.p2Name}: ${state.p2Score}`;
            } else if (state.p2Score > state.p1Score) {
                winner = state.p2Name;
                scoreText = `${state.p1Name}: ${state.p1Score} - ${state.p2Name}: ${state.p2Score}`;
            } else {
                winner = 'تعادل!';
                scoreText = `${state.p1Name}: ${state.p1Score} - ${state.p2Name}: ${state.p2Score}`;
            }
            certWinner.textContent = winner;
            certScore.textContent = `النتيجة: ${scoreText}`;
            certOverlay.classList.add('show');
        }

        // ============================================================
        // إعادة تعيين اللعبة
        // ============================================================
        function resetGame() {
            const count = parseInt(qCount.value);
            const train = state.isTrain;
            state.total = train ? 100 : count;
            state.questions = buildQuestions(state.total, train);
            state.currentIndex = 0;
            state.p1Score = 0;
            state.p2Score = 0;
            state.turn = 1;
            state.isAnswered = false;
            state.isGameOver = false;
            state.halfUsed = false;
            state.wrongTeam = null;
            state.locked = false;
            certOverlay.classList.remove('show');
            updateNamesUI();
            updateScoreUI();
            clearCelebration();
            loadQuestion(0);
            optionsBtns.forEach(b => b.disabled = false);
            nextBtn.disabled = true;
            if (state.isTrain) {
                turnDisplay.textContent = '🧘 تدريب حر';
                trainSub.classList.add('show');
            } else {
                trainSub.classList.remove('show');
            }
            updateCounterUI();
        }

        // ============================================================
        // تبديل وضع التدريب
        // ============================================================
        function toggleTrain() {
            state.isTrain = !state.isTrain;
            if (state.isTrain) {
                trainBtn.classList.add('active');
                trainBtn.textContent = '🧘 تدريب حر (نشط)';
                qCount.disabled = true;
                trainSub.classList.add('show');
                state.trainSub = 'practice';
                subPractice.classList.add('active-option');
                subExam.classList.remove('active-option');
            } else {
                trainBtn.classList.remove('active');
                trainBtn.textContent = '🧘 تدريب حر';
                qCount.disabled = false;
                trainSub.classList.remove('show');
                state.trainSub = 'practice';
            }
            resetGame();
        }

        function setTrainSub(mode) {
            state.trainSub = mode;
            if (mode === 'practice') {
                subPractice.classList.add('active-option');
                subExam.classList.remove('active-option');
            } else {
                subExam.classList.add('active-option');
                subPractice.classList.remove('active-option');
            }
            resetGame();
        }

        // ============================================================
        // إرسال النتيجة للمستر
        // ============================================================
        function sendResult() {
            const phone = '01064930059';
            const msg =
                `🎯 نتيجة المسابقة 🎯\n\n` +
                `👤 ${state.p1Name}: ${state.p1Score} نقطة\n` +
                `👤 ${state.p2Name}: ${state.p2Score} نقطة\n` +
                `📚 عدد الأسئلة: ${state.total}\n` +
                `🏆 برعاية مستر سامح عبد الحفيظ\n` +
                `📅 ${new Date().toLocaleDateString('ar-EG')}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // ============================================================
        // معالج النقر على زر الإجابة
        // ============================================================
        function handleAnswer(e) {
            const btn = e.currentTarget;
            if (btn.disabled || state.locked || state.isGameOver) return;
            if (state.isAnswered && !state.isTrain) return;

            // منع الفريق الخطأ من الإجابة في حالة نصف النقطة
            if (!state.isTrain && state.wrongTeam && state.turn === state.wrongTeam) {
                celebrateBox.innerHTML = `<span style="color:#f8b0b0;">⛔ ليس دورك، انتظر الفريق الآخر</span>`;
                return;
            }

            const isCorrect = btn.dataset.correct === 'true';
            const team = state.turn;
            state.locked = true;
            optionsBtns.forEach(b => b.disabled = true);

            // ---- التدريب الحر ----
            if (state.isTrain) {
                if (state.trainSub === 'practice') {
                    // تدريبات: تظهر النتيجة فوراً
                    if (isCorrect) {
                        if (team === 1) state.p1Score++;
                        else state.p2Score++;
                        updateScoreUI();
                        showCelebration(team, false);
                        optionsBtns.forEach(b => {
                            if (b.dataset.correct === 'true') b.classList.add('correct-show');
                        });
                    } else {
                        celebrateBox.innerHTML = `<span style="color:#f8b0b0; font-size:1.8rem;">❌ إجابة خاطئة</span>`;
                        optionsBtns.forEach(b => {
                            if (b.dataset.correct === 'true') b.classList.add('correct-show');
                        });
                        btn.classList.add('wrong-show');
                        const correctAns = optionsBtns[state.correctIdx]?.textContent || '';
                        celebrateBox.innerHTML +=
                            `<span style="color:#ffdd99; font-size:1.2rem;"> الإجابة الصحيحة: ${correctAns}</span>`;
                    }
                    state.isAnswered = true;
                    nextBtn.disabled = false;
                    state.locked = false;
                    setTimeout(() => {
                        if (state.isAnswered && !state.isGameOver) goToNext();
                    }, 1200);
                    return;
                } else {
                    // اختبار بدرجات: مثل المنافسة
                    if (isCorrect) {
                        if (team === 1) state.p1Score++;
                        else state.p2Score++;
                        updateScoreUI();
                        showCelebration(team, false);
                        optionsBtns.forEach(b => {
                            if (b.dataset.correct === 'true') b.classList.add('correct-show');
                        });
                        state.isAnswered = true;
                        nextBtn.disabled = false;
                        state.turn = (state.turn === 1 ? 2 : 1);
                        turnDisplay.textContent = getPlayerName(state.turn);
                        state.locked = false;
                        setTimeout(() => {
                            if (state.isAnswered && !state.isGameOver) goToNext();
                        }, 700);
                    } else {
                        if (!state.halfUsed) {
                            const other = (team === 1 ? 2 : 1);
                            if (other === 1) state.p1Score += 0.5;
                            else state.p2Score += 0.5;
                            updateScoreUI();
                            showCelebration(other, true);
                            state.halfUsed = true;
                            state.wrongTeam = team;
                            state.turn = other;
                            turnDisplay.textContent = getPlayerName(other);
                            btn.classList.add('half-show');
                            optionsBtns.forEach(b => {
                                if (b.dataset.correct === 'true') b.classList.add('correct-show');
                            });
                            // نعيد تمكين الأزرار للفريق الآخر
                            optionsBtns.forEach(b => { b.disabled = false; });
                            state.isAnswered = false;
                            nextBtn.disabled = true;
                            state.locked = false;
                        } else {
                            celebrateBox.innerHTML = `<span style="color:#f8b0b0;">⛔ تم استخدام نصف النقطة</span>`;
                            optionsBtns.forEach(b => b.disabled = true);
                            state.isAnswered = true;
                            nextBtn.disabled = false;
                            state.locked = false;
                            setTimeout(() => {
                                if (state.isAnswered && !state.isGameOver) goToNext();
                            }, 700);
                        }
                    }
                    return;
                }
            }

            // ---- الوضع التنافسي ----
            if (isCorrect) {
                if (team === 1) state.p1Score++;
                else state.p2Score++;
                updateScoreUI();
                showCelebration(team, false);
                optionsBtns.forEach(b => {
                    if (b.dataset.correct === 'true') b.classList.add('correct-show');
                });
                state.isAnswered = true;
                nextBtn.disabled = false;
                state.turn = (state.turn === 1 ? 2 : 1);
                turnDisplay.textContent = getPlayerName(state.turn);
                state.locked = false;
                setTimeout(() => {
                    if (state.isAnswered && !state.isGameOver) goToNext();
                }, 700);
            } else {
                if (!state.halfUsed) {
                    const other = (team === 1 ? 2 : 1);
                    if (other === 1) state.p1Score += 0.5;
                    else state.p2Score += 0.5;
                    updateScoreUI();
                    showCelebration(other, true);
                    state.halfUsed = true;
                    state.wrongTeam = team;
                    state.turn = other;
                    turnDisplay.textContent = getPlayerName(other);
                    btn.classList.add('half-show');
                    optionsBtns.forEach(b => {
                        if (b.dataset.correct === 'true') b.classList.add('correct-show');
                    });
                    optionsBtns.forEach(b => { b.disabled = false; });
                    state.isAnswered = false;
                    nextBtn.disabled = true;
                    state.locked = false;
                } else {
                    celebrateBox.innerHTML = `<span style="color:#f8b0b0;">⛔ تم استخدام نصف النقطة</span>`;
                    optionsBtns.forEach(b => b.disabled = true);
                    state.isAnswered = true;
                    nextBtn.disabled = false;
                    state.locked = false;
                    setTimeout(() => {
                        if (state.isAnswered && !state.isGameOver) goToNext();
                    }, 700);
                }
            }
        }

        // ============================================================
        // تحديث الأسماء
        // ============================================================
        function updateNames() {
            state.p1Name = p1name.value.trim() || 'اللاعب 1';
            state.p2Name = p2name.value.trim() || 'اللاعب 2';
            updateNamesUI();
            updateScoreUI();
            if (!state.isTrain) {
                turnDisplay.textContent = getPlayerName(state.turn);
            }
        }

        // ============================================================
        // تهيئة اللعبة
        // ============================================================
        function init() {
            // تعيين القيم الافتراضية
            state.p1Name = p1name.value.trim() || 'أحمد';
            state.p2Name = p2name.value.trim() || 'محمد';
            qCount.value = '20';
            state.total = 20;
            state.questions = buildQuestions(state.total, false);
            updateNamesUI();
            resetGame();

            // ربط الأحداث
            optionsBtns.forEach(btn => {
                btn.addEventListener('click', handleAnswer);
            });

            nextBtn.addEventListener('click', goToNext);
            resetBtn.addEventListener('click', resetGame);
            trainBtn.addEventListener('click', toggleTrain);
            subPractice.addEventListener('click', () => setTrainSub('practice'));
            subExam.addEventListener('click', () => setTrainSub('exam'));
            updateNamesBtn.addEventListener('click', updateNames);
            p1name.addEventListener('change', updateNames);
            p2name.addEventListener('change', updateNames);
            sendResultBtn.addEventListener('click', sendResult);
            closeCert.addEventListener('click', () => {
                certOverlay.classList.remove('show');
            });
            qCount.addEventListener('change', () => {
                if (!state.isTrain) resetGame();
            });
        }

        // بدء التشغيل
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
